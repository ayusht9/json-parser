services:
  aerojson:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aerojson-app
    ports:
      - "3000:5000"       # Host port 3000 → container port 5000
    environment:
      - PORT=5000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
