version: '3.9'

services:
  aerojson:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aerojson-app
    ports:
      - "5000:5000"       # Map host:container port
    environment:
      - PORT=5000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
